<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>impulspace — deep network</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #04060f;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    canvas {
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    /* Demo-Content — zeigt wie Text auf dem Hintergrund wirkt */
    .demo-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      pointer-events: none;
    }

    .demo-content h1 {
      color: rgba(180, 210, 240, 0.9);
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-shadow: 0 0 60px rgba(0, 180, 220, 0.3);
      margin-bottom: 0.5em;
    }

    .demo-content p {
      color: rgba(140, 180, 210, 0.5);
      font-size: 0.9rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    .demo-hint {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
      pointer-events: none;
      color: rgba(100, 150, 180, 0.25);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="demo-content">
    <h1>impulspace</h1>
    <p>Deep Network · Cyber Security</p>
  </div>

  <div class="demo-hint">Hintergrund-Animation · z-index: 0</div>

  <script>
    // ═══════════════════════════════════════════
    //  DEEP NETWORK — Background Engine
    //  Für Cyber-Security-Website
    // ═══════════════════════════════════════════

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let w, h;
    let mouseX = -1000, mouseY = -1000;
    let targetMouseX = -1000, targetMouseY = -1000;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Maus-Interaktion (sanftes Verziehen des Netzes)
    window.addEventListener('mousemove', e => {
      targetMouseX = e.clientX;
      targetMouseY = e.clientY;
    });

    // ——— Konfiguration ———
    const COLORS = {
      bg:        '#04060f',
      nodeBase:  { r: 0, g: 180, b: 220 },  // Cyan
      nodeAlt:   { r: 80, g: 120, b: 220 }, // Blau/Violett
      connBase:  { r: 0, g: 160, b: 200 },  // Cyan (Verbindungen)
      connAlt:   { r: 60, g: 100, b: 200 }, // Blau
      pulse:     { r: 120, g: 220, b: 255 }, // Hell-Cyan (Datenpakete)
      scanBeam:  { r: 0, g: 200, b: 255 },
    };

    // ——— Nodes ———
    const NODE_COUNT = 65;
    const nodes = [];

    class Node {
      constructor() {
        this.reset(true);
      }

      reset(initial = false) {
        // Position: Gitter mit leichter Streuung, für gleichmäßige Abdeckung
        if (initial) {
          const cols = Math.ceil(Math.sqrt(NODE_COUNT * (w / h)));
          const rows = Math.ceil(NODE_COUNT / cols);
          const colW = w / (cols + 1);
          const rowH = h / (rows + 1);
          const i = nodes.length;
          const col = i % cols;
          const row = Math.floor(i / cols);
          this.x = colW * (col + 1) + (Math.random() - 0.5) * colW * 0.5;
          this.y = rowH * (row + 1) + (Math.random() - 0.5) * rowH * 0.5;
        } else {
          this.x = Math.random() * w;
          this.y = Math.random() * h;
        }

        // Drift-Parameter
        this.driftAngle = Math.random() * Math.PI * 2;
        this.driftSpeed = 0.05 + Math.random() * 0.25;      // px/s — sehr langsam
        this.driftChangeTimer = 2000 + Math.random() * 8000; // ms bis Richtungswechsel
        this.lastDriftChange = performance.now();

        // Visuelle Eigenschaften
        this.radius = 0.6 + Math.random() * 1.6;
        this.baseAlpha = 0.08 + Math.random() * 0.18;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.pulseSpeed = 0.0003 + Math.random() * 0.001;

        // Typ: 'core' = wichtiger Knoten (mehr Connections), 'edge' = Rand-Knoten
        this.type = Math.random() < 0.2 ? 'core' : 'edge';
        if (this.type === 'core') {
          this.radius *= 1.6;
          this.baseAlpha = Math.min(0.35, this.baseAlpha * 2.2);
        }

        // Farbe: Mischung zwischen Cyan und Blau
        const mix = Math.random();
        this.color = {
          r: Math.round(COLORS.nodeBase.r + (COLORS.nodeAlt.r - COLORS.nodeBase.r) * mix),
          g: Math.round(COLORS.nodeBase.g + (COLORS.nodeAlt.g - COLORS.nodeBase.g) * mix),
          b: Math.round(COLORS.nodeBase.b + (COLORS.nodeAlt.b - COLORS.nodeBase.b) * mix),
        };
      }

      update(now) {
        // Drift-Richtung periodisch ändern
        if (now - this.lastDriftChange > this.driftChangeTimer) {
          this.driftAngle += (Math.random() - 0.5) * Math.PI * 1.2;
          this.driftSpeed = 0.05 + Math.random() * 0.25;
          this.driftChangeTimer = 3000 + Math.random() * 10000;
          this.lastDriftChange = now;
        }

        // Bewegung
        this.x += Math.cos(this.driftAngle) * this.driftSpeed * 0.06;
        this.y += Math.sin(this.driftAngle) * this.driftSpeed * 0.06;

        // Wrap-around mit weichem Rand (Gummiband-Effekt)
        const margin = 60;
        if (this.x < -margin) this.x = w + margin;
        if (this.x > w + margin) this.x = -margin;
        if (this.y < -margin) this.y = h + margin;
        if (this.y > h + margin) this.y = -margin;

        // Maus-Abstoßung (sanft)
        const dx = this.x - mouseX;
        const dy = this.y - mouseY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const influenceRadius = 160;
        if (dist < influenceRadius && dist > 0.1) {
          const force = (1 - dist / influenceRadius) * 1.2;
          this.x += (dx / dist) * force;
          this.y += (dy / dist) * force;
        }

        // Pulsierende Alpha
        this.currentAlpha = this.baseAlpha * (0.7 + 0.3 * Math.sin(now * this.pulseSpeed + this.pulsePhase));
      }
    }

    // Initialisiere Nodes
    for (let i = 0; i < NODE_COUNT; i++) {
      nodes.push(new Node());
    }

    // ——— Verbindungen ———
    // Werden jedes Frame dynamisch berechnet (Nähe-basiert)
    const MAX_CONN_DIST = 180; // Maximale Distanz für eine Verbindung

    // ——— Daten-Pulse (Pakete die über Connections reisen) ———
    const pulses = [];
    const MAX_PULSES = 8;

    function spawnPulse(now) {
      // Finde zwei verbundene Nodes
      const candidates = [];
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const dx = nodes[i].x - nodes[j].x;
          const dy = nodes[i].y - nodes[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < MAX_CONN_DIST && nodes[i].type === 'core') {
            candidates.push({ from: nodes[i], to: nodes[j], dist });
          }
        }
      }

      if (candidates.length === 0) return;

      const pair = candidates[Math.floor(Math.random() * candidates.length)];
      pulses.push({
        from: pair.from,
        to: pair.to,
        progress: 0,
        speed: 0.0004 + Math.random() * 0.0015,
        alpha: 0.25 + Math.random() * 0.5,
        startTime: now,
      });
    }

    // ——— Scan-Beam (horizontaler Scan-Streifen, wie ein Analysator) ———
    let scanY = -50;
    let scanActive = false;
    let scanCooldown = 5000;

    // ——— Render ———

    function getConnectionAlpha(nodeA, nodeB) {
      const dx = nodeA.x - nodeB.x;
      const dy = nodeA.y - nodeB.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > MAX_CONN_DIST) return 0;

      // Näher = stärkere Verbindung
      const distFactor = 1 - dist / MAX_CONN_DIST;
      // Core-Nodes haben stärkere Verbindungen
      const coreBonus = (nodeA.type === 'core' || nodeB.type === 'core') ? 1.6 : 1;
      // Aktuelle Puls-Alpha einbeziehen
      const avgAlpha = (nodeA.currentAlpha + nodeB.currentAlpha) / 2;

      return distFactor * coreBonus * avgAlpha * 1.8;
    }

    function drawBackground() {
      // Tiefes, sattes Dunkelblau
      const grad = ctx.createRadialGradient(w * 0.3, h * 0.4, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.8);
      grad.addColorStop(0, '#080e1f');
      grad.addColorStop(0.5, '#050912');
      grad.addColorStop(1, '#020408');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawConnections() {
      // Nur einen Teil der Connections zeichnen (nächste Nachbarn)
      for (let i = 0; i < nodes.length; i++) {
        for (let j = i + 1; j < nodes.length; j++) {
          const alpha = getConnectionAlpha(nodes[i], nodes[j]);
          if (alpha <= 0.002) continue;

          // Interpoliere Farbe basierend auf Position
          const mixFactor = (nodes[i].y / h + nodes[j].y / h) / 2;
          const r = Math.round(COLORS.connBase.r + (COLORS.connAlt.r - COLORS.connBase.r) * mixFactor);
          const g = Math.round(COLORS.connBase.g + (COLORS.connAlt.g - COLORS.connBase.g) * mixFactor);
          const b = Math.round(COLORS.connBase.b + (COLORS.connAlt.b - COLORS.connBase.b) * mixFactor);

          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha.toFixed(4)})`;
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(nodes[i].x, nodes[i].y);
          ctx.lineTo(nodes[j].x, nodes[j].y);
          ctx.stroke();
        }
      }
    }

    function drawNodes() {
      for (const node of nodes) {
        if (node.currentAlpha < 0.01) continue;

        const alpha = node.currentAlpha.toFixed(4);
        const { r, g, b } = node.color;

        // Äußerer Glow (nur bei Core-Nodes)
        if (node.type === 'core') {
          const glow = ctx.createRadialGradient(node.x, node.y, 0, node.x, node.y, node.radius * 4);
          glow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${Math.min(0.15, node.currentAlpha * 1.5).toFixed(4)})`);
          glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(node.x, node.y, node.radius * 4, 0, Math.PI * 2);
          ctx.fill();
        }

        // Kern
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${alpha})`;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawPulses() {
      for (const pulse of pulses) {
        const x = pulse.from.x + (pulse.to.x - pulse.from.x) * pulse.progress;
        const y = pulse.from.y + (pulse.to.y - pulse.from.y) * pulse.progress;

        const { r, g, b } = COLORS.pulse;
        const alpha = pulse.alpha * Math.sin(pulse.progress * Math.PI);

        // Glow
        const glow = ctx.createRadialGradient(x, y, 0, x, y, 7);
        glow.addColorStop(0, `rgba(255, 255, 255, ${(alpha * 0.9).toFixed(4)})`);
        glow.addColorStop(0.2, `rgba(${r}, ${g}, ${b}, ${(alpha * 0.7).toFixed(4)})`);
        glow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${(alpha * 0.2).toFixed(4)})`);
        glow.addColorStop(1, 'rgba(0, 0, 0, 0)');

        ctx.fillStyle = glow;
        ctx.fillRect(x - 8, y - 8, 16, 16);
      }
    }

    function drawScanBeam(now) {
      if (!scanActive) return;

      const beamHeight = 2;
      const gradient = ctx.createLinearGradient(0, scanY - 40, 0, scanY + 40);
      gradient.addColorStop(0, 'rgba(0, 200, 255, 0)');
      gradient.addColorStop(0.3, 'rgba(0, 200, 255, 0.06)');
      gradient.addColorStop(0.5, 'rgba(0, 220, 255, 0.18)');
      gradient.addColorStop(0.7, 'rgba(0, 200, 255, 0.06)');
      gradient.addColorStop(1, 'rgba(0, 200, 255, 0)');

      ctx.fillStyle = gradient;
      ctx.fillRect(0, scanY - 40, w, 80);

      // Kern-Linie
      ctx.strokeStyle = 'rgba(0, 220, 255, 0.12)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(0, scanY);
      ctx.lineTo(w, scanY);
      ctx.stroke();
    }

    // ——— Game Loop ———

    function update(now) {
      // Maus-Smoothing
      mouseX += (targetMouseX - mouseX) * 0.05;
      mouseY += (targetMouseY - mouseY) * 0.05;

      // Nodes updaten
      for (const node of nodes) {
        node.update(now);
      }

      // Pulse updaten
      for (let i = pulses.length - 1; i >= 0; i--) {
        pulses[i].progress += pulses[i].speed;
        if (pulses[i].progress >= 1) {
          pulses.splice(i, 1);
        }
      }

      // Neue Pulse spawnen
      if (pulses.length < MAX_PULSES && Math.random() < 0.03) {
        spawnPulse(now);
      }

      // Scan-Beam
      if (scanActive) {
        scanY += 0.8;
        if (scanY > h + 50) {
          scanActive = false;
          scanCooldown = 8000 + Math.random() * 15000;
        }
      } else {
        scanCooldown -= 16; // ca. 60fps
        if (scanCooldown <= 0) {
          scanActive = true;
          scanY = -50;
        }
      }
    }

    function render(now) {
      update(now);

      drawBackground();
      drawConnections();
      drawPulses();
      drawScanBeam(now);
      drawNodes();
    }

    function loop(timestamp) {
      render(timestamp);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
