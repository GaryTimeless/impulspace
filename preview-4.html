<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>impulspace — onyx & gold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #080808;
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: none;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
    .demo-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; pointer-events: none;
    }
    .demo-content h1 {
      color: rgba(200, 180, 140, 0.9);
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 200; letter-spacing: 0.25em;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(180, 150, 100, 0.25);
    }
    .demo-content p {
      color: rgba(170, 160, 140, 0.4);
      font-size: 0.75rem; letter-spacing: 0.4em;
      text-transform: uppercase; margin-top: 0.8em;
    }
  </style>

<style>
.pv-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(10,11,16,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,150,62,0.2);font-family:Inter,-apple-system,sans-serif;}
.pv-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:48px;gap:12px;}
.pv-nav-btn,.pv-nav-home{color:#C8963E;text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;transition:all .2s;border:1px solid rgba(200,150,62,0.25);white-space:nowrap;}
.pv-nav-btn:hover,.pv-nav-home:hover{background:rgba(200,150,62,0.12);border-color:rgba(200,150,62,0.5);}
.pv-nav-disabled{color:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.08);cursor:default;}
.pv-nav-info{color:rgba(255,255,255,0.5);font-size:12px;white-space:nowrap;text-align:center;}
.pv-nav-home{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;margin-left:auto;}
@media(max-width:600px){.pv-nav-inner{gap:6px;}.pv-nav-btn{font-size:11px;padding:4px 10px;}.pv-nav-home{display:none;}}
</style>
</head>
<body>
<nav class="pv-nav">
  <div class="pv-nav-inner">
    <a href="/impulspace/preview-3.html" class="pv-nav-btn">← Zurück</a>
    <span class="pv-nav-info">Preview 4 / 6</span>
    <a href="/impulspace/preview-5.html" class="pv-nav-btn">Weiter →</a>
    <a href="/impulspace/" class="pv-nav-home" title="Zur Hauptseite">IMPULSPACE</a>
  </div>
</nav>

  <canvas id="c"></canvas>
  <div class="demo-content">
    <h1>Onyx & Gold</h1>
    <p>Precision Security</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ═══ ONYX & GOLD — Minimalistisch, geometrisch, High-End ═══
    // Farben: Schwarz, Gold (#b8963e), Platin/Weiß (#e8e0d5)

    const GOLD   = { r: 184, g: 150, b: 62 };
    const PLATIN = { r: 232, g: 224, b: 213 };
    const DARK   = { r: 20,  g: 18,  b: 14 };

    // ——— Golden-Ratio-Grid und Orbiting-Partikel ———
    const orbs = [];
    const ORB_COUNT = 40;

    class Orb {
      constructor() {
        // Orbit um einen von mehreren Zentren
        this.cx = w * (0.2 + Math.random() * 0.6);
        this.cy = h * (0.2 + Math.random() * 0.6);
        this.rx = 80 + Math.random() * 300;  // Ellipsen-Radius X
        this.ry = 60 + Math.random() * 200;  // Ellipsen-Radius Y
        this.angle = Math.random() * Math.PI * 2;
        this.speed = 0.0002 + Math.random() * 0.0006;
        this.radius = 0.5 + Math.random() * 1.8;
        this.baseAlpha = 0.04 + Math.random() * 0.12;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.trail = [];
        this.maxTrail = 18 + Math.floor(Math.random() * 30);
      }

      update(now) {
        this.angle += this.speed;
        this.x = this.cx + Math.cos(this.angle) * this.rx;
        this.y = this.cy + Math.sin(this.angle) * this.ry;
        this.currentAlpha = this.baseAlpha * (0.6 + 0.4 * Math.sin(now * 0.0005 + this.pulsePhase));

        this.trail.push({ x: this.x, y: this.y, a: this.currentAlpha });
        if (this.trail.length > this.maxTrail) this.trail.shift();
      }
    }

    for (let i = 0; i < ORB_COUNT; i++) orbs.push(new Orb());

    // ——— Gold-Linien (geometrisch, selten) ———
    const beams = [];
    const MAX_BEAMS = 3;

    function spawnBeam() {
      const edge = Math.floor(Math.random() * 4);
      let x1, y1, x2, y2;
      const margin = 40;

      if (edge === 0) { // top
        x1 = Math.random() * w; y1 = margin;
        x2 = Math.random() * w; y2 = h - margin;
      } else if (edge === 1) { // right
        x1 = w - margin; y1 = Math.random() * h;
        x2 = margin; y2 = Math.random() * h;
      } else if (edge === 2) { // bottom
        x1 = Math.random() * w; y1 = h - margin;
        x2 = Math.random() * w; y2 = margin;
      } else { // left
        x1 = margin; y1 = Math.random() * h;
        x2 = w - margin; y2 = Math.random() * h;
      }

      beams.push({
        x1, y1, x2, y2,
        life: 0,
        maxLife: 3000 + Math.random() * 4000,
        maxAlpha: 0.06 + Math.random() * 0.1,
        startTime: performance.now(),
      });
    }

    // ——— Render ———

    function drawBg() {
      const grad = ctx.createRadialGradient(w * 0.5, h * 0.4, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
      grad.addColorStop(0, '#11100c');
      grad.addColorStop(0.6, '#0a0907');
      grad.addColorStop(1, '#040404');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawOrbs(now) {
      for (const orb of orbs) {
        // Trail
        if (orb.trail.length > 1) {
          for (let i = 1; i < orb.trail.length; i++) {
            const t = i / orb.trail.length;
            const alpha = orb.trail[i].a * t * 0.5;
            ctx.strokeStyle = `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, ${alpha.toFixed(4)})`;
            ctx.lineWidth = 0.4;
            ctx.beginPath();
            ctx.moveTo(orb.trail[i - 1].x, orb.trail[i - 1].y);
            ctx.lineTo(orb.trail[i].x, orb.trail[i].y);
            ctx.stroke();
          }
        }

        // Punkt
        if (orb.currentAlpha > 0.01) {
          // Glow
          const glow = ctx.createRadialGradient(orb.x, orb.y, 0, orb.x, orb.y, orb.radius * 3);
          glow.addColorStop(0, `rgba(${PLATIN.r}, ${PLATIN.g}, ${PLATIN.b}, ${Math.min(0.2, orb.currentAlpha * 2).toFixed(4)})`);
          glow.addColorStop(0.5, `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, ${(orb.currentAlpha * 0.6).toFixed(4)})`);
          glow.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.arc(orb.x, orb.y, orb.radius * 3, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = `rgba(${PLATIN.r}, ${PLATIN.g}, ${PLATIN.b}, ${orb.currentAlpha.toFixed(4)})`;
          ctx.beginPath();
          ctx.arc(orb.x, orb.y, orb.radius, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawBeams(now) {
      for (const beam of beams) {
        const progress = beam.life / beam.maxLife;
        const alpha = beam.maxAlpha * Math.sin(progress * Math.PI);
        const grad = ctx.createLinearGradient(beam.x1, beam.y1, beam.x2, beam.y2);
        grad.addColorStop(0, `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, 0)`);
        grad.addColorStop(0.3, `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, ${(alpha * 0.5).toFixed(4)})`);
        grad.addColorStop(0.5, `rgba(${PLATIN.r}, ${PLATIN.g}, ${PLATIN.b}, ${alpha.toFixed(4)})`);
        grad.addColorStop(0.7, `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, ${(alpha * 0.5).toFixed(4)})`);
        grad.addColorStop(1, `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, 0)`);

        ctx.strokeStyle = grad;
        ctx.lineWidth = 0.6;
        ctx.beginPath();
        ctx.moveTo(beam.x1, beam.y1);
        ctx.lineTo(beam.x2, beam.y2);
        ctx.stroke();
      }
    }

    function drawGoldenRatioLines() {
      // Dezente diagonale Linien im goldenen Schnitt
      const phi = 1.618;
      const h1 = h / phi;
      const h2 = h - h / phi;

      ctx.strokeStyle = 'rgba(184, 150, 62, 0.015)';
      ctx.lineWidth = 0.3;

      for (const y of [h1, h2]) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      const w1 = w / phi;
      const w2 = w - w / phi;
      for (const x of [w1, w2]) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
    }

    function update(now) {
      for (const orb of orbs) orb.update(now);

      for (let i = beams.length - 1; i >= 0; i--) {
        beams[i].life = now - beams[i].startTime;
        if (beams[i].life > beams[i].maxLife) beams.splice(i, 1);
      }

      if (beams.length < MAX_BEAMS && Math.random() < 0.008) spawnBeam();
    }

    function loop(ts) {
      update(ts);
      drawBg();
      drawGoldenRatioLines();
      drawBeams(ts);
      drawOrbs(ts);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
