<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>impulspace — verdigris & gold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060808;
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: none;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
    .demo-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; pointer-events: none;
    }
    .demo-content h1 {
      color: rgba(180, 165, 120, 0.9);
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 300; letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 0 40px rgba(140, 160, 100, 0.2), 0 0 80px rgba(80, 110, 50, 0.1);
    }
    .demo-content p {
      color: rgba(140, 150, 120, 0.4);
      font-size: 0.75rem; letter-spacing: 0.4em;
      text-transform: uppercase; margin-top: 0.8em;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div class="demo-content">
    <h1>Verdigris & Gold</h1>
    <p>Ancient Code</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // ═══ VERDIGRIS & GOLD — Bronze/Patina, organisch, antik+futuristisch ═══
    // Farben: Schwarz, Gold (#b89840), Patina-Grün (#5a8a6a, #7a9a6a oxidierter Bronze-Ton)

    const GOLD     = { r: 184, g: 152, b: 64 };
    const PATINA   = { r: 90,  g: 138, b: 106 };
    const PATINA_B = { r: 70,  g: 110, b: 85 };
    const COPPER   = { r: 160, g: 100, b: 60 };
    const OXIDE    = { r: 50,  g: 90,  b: 70 };

    // ——— Hexagonales Grid (wie Bienenwaben / organische Schaltkreise) ———
    const HEX_SIZE = 55;
    const cells = [];

    function initHexGrid() {
      cells.length = 0;
      const dx = HEX_SIZE * 1.5;
      const dy = HEX_SIZE * Math.sqrt(3);
      const cols = Math.ceil(w / dx) + 2;
      const rows = Math.ceil(h / dy) + 2;

      for (let r = -1; r < rows; r++) {
        for (let c = -1; c < cols; c++) {
          const x = c * dx + (r % 2 === 0 ? 0 : dx * 0.5);
          const y = r * dy;
          if (x > -HEX_SIZE && x < w + HEX_SIZE && y > -HEX_SIZE && y < h + HEX_SIZE) {
            cells.push({
              cx: x, cy: y,
              baseAlpha: 0.015 + Math.random() * 0.04,
              pulsePhase: Math.random() * Math.PI * 2,
              pulseSpeed: 0.0004 + Math.random() * 0.001,
              type: Math.random() < 0.08 ? 'core' : 'regular',
              connections: [],
            });
          }
        }
      }
    }

    initHexGrid();

    // Baue Connections (benachbarte Zellen)
    function buildConnections() {
      for (let i = 0; i < cells.length; i++) {
        cells[i].connections.length = 0;
        for (let j = i + 1; j < cells.length; j++) {
          const dx = cells[i].cx - cells[j].cx;
          const dy = cells[i].cy - cells[j].cy;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < HEX_SIZE * 1.9 && dist > HEX_SIZE * 0.8) {
            cells[i].connections.push(j);
            cells[j].connections.push(i);
          }
        }
      }
    }

    buildConnections();

    // ——— Wachsende/verblassende "Patina-Flecken" ———
    const blooms = [];
    const MAX_BLOOMS = 6;

    function spawnBloom() {
      const cell = cells[Math.floor(Math.random() * cells.length)];
      blooms.push({
        x: cell.cx,
        y: cell.cy,
        radius: 0,
        maxRadius: 60 + Math.random() * 180,
        life: 0,
        duration: 4000 + Math.random() * 6000,
        startTime: performance.now(),
        color: Math.random() < 0.5 ? PATINA : PATINA_B,
      });
    }

    // ——— Gold-Adern (organische Linien zwischen Core-Zellen) ———
    const veins = [];
    const MAX_VEINS = 4;

    function spawnVein() {
      const coreCells = cells.filter(c => c.type === 'core');
      if (coreCells.length < 2) return;

      const from = coreCells[Math.floor(Math.random() * coreCells.length)];
      let to = coreCells[Math.floor(Math.random() * coreCells.length)];
      while (to === from) to = coreCells[Math.floor(Math.random() * coreCells.length)];

      // Pfad mit 2-3 Zwischenpunkten für organische Krümmung
      const points = [{ x: from.cx, y: from.cy }];
      const steps = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < steps; i++) {
        const t = (i + 1) / (steps + 1);
        const bx = from.cx + (to.cx - from.cx) * t + (Math.random() - 0.5) * 200;
        const by = from.cy + (to.cy - from.cy) * t + (Math.random() - 0.5) * 200;
        points.push({ x: bx, y: by });
      }
      points.push({ x: to.cx, y: to.cy });

      veins.push({
        points,
        life: 0,
        duration: 5000 + Math.random() * 8000,
        startTime: performance.now(),
        maxAlpha: 0.04 + Math.random() * 0.07,
      });
    }

    // ——— Render ———

    function drawBg() {
      const grad = ctx.createRadialGradient(w * 0.4, h * 0.3, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.8);
      grad.addColorStop(0, '#0c0e0a');
      grad.addColorStop(0.5, '#060806');
      grad.addColorStop(1, '#030503');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawHexagons(now) {
      for (const cell of cells) {
        const pulse = 0.5 + 0.5 * Math.sin(now * cell.pulseSpeed + cell.pulsePhase);
        let alpha = cell.baseAlpha * (0.5 + pulse * 0.5);

        if (cell.type === 'core') alpha *= 2.5;

        if (alpha < 0.003) continue;

        // Hexagon zeichnen
        const points = [];
        for (let i = 0; i < 6; i++) {
          const angle = (Math.PI / 3) * i - Math.PI / 6;
          const px = cell.cx + Math.cos(angle) * HEX_SIZE * 0.4;
          const py = cell.cy + Math.sin(angle) * HEX_SIZE * 0.4;
          points.push({ x: px, y: py });
        }

        // Füllung
        const color = cell.type === 'core' ? GOLD : PATINA;
        ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${alpha.toFixed(4)})`;
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < 6; i++) ctx.lineTo(points[i].x, points[i].y);
        ctx.closePath();
        ctx.fill();

        // Rand
        const strokeAlpha = alpha * 1.8;
        ctx.strokeStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${strokeAlpha.toFixed(4)})`;
        ctx.lineWidth = 0.3;
        ctx.stroke();
      }
    }

    function drawHexConnections(now) {
      const drawn = new Set();
      for (const cell of cells) {
        if (cell.type !== 'core') continue;
        for (const connIdx of cell.connections) {
          const key = Math.min(cells.indexOf(cell), connIdx) + '_' + Math.max(cells.indexOf(cell), connIdx);
          if (drawn.has(key)) continue;
          drawn.add(key);

          const other = cells[connIdx];
          ctx.strokeStyle = `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, 0.025)`;
          ctx.lineWidth = 0.4;
          ctx.beginPath();
          ctx.moveTo(cell.cx, cell.cy);
          ctx.lineTo(other.cx, other.cy);
          ctx.stroke();
        }
      }
    }

    function drawBlooms(now) {
      for (const bloom of blooms) {
        const progress = Math.min(1, bloom.life / bloom.duration);
        const alpha = 0.06 * Math.sin(progress * Math.PI) * (1 - progress * 0.7);

        const grad = ctx.createRadialGradient(bloom.x, bloom.y, 0, bloom.x, bloom.y, bloom.radius);
        grad.addColorStop(0, `rgba(${bloom.color.r}, ${bloom.color.g}, ${bloom.color.b}, ${(alpha * 1.5).toFixed(4)})`);
        grad.addColorStop(0.5, `rgba(${bloom.color.r}, ${bloom.color.g}, ${bloom.color.b}, ${alpha.toFixed(4)})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(bloom.x, bloom.y, bloom.radius, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawVeins(now) {
      for (const vein of veins) {
        const progress = Math.min(1, vein.life / vein.duration);
        const alpha = vein.maxAlpha * Math.sin(progress * Math.PI);

        // Kurve mit quadratischen Bézier-Punkten
        ctx.strokeStyle = `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, ${alpha.toFixed(4)})`;
        ctx.lineWidth = 0.5 + alpha * 3;

        ctx.beginPath();
        ctx.moveTo(vein.points[0].x, vein.points[0].y);

        for (let i = 1; i < vein.points.length - 1; i++) {
          const xc = (vein.points[i].x + vein.points[i + 1].x) / 2;
          const yc = (vein.points[i].y + vein.points[i + 1].y) / 2;
          ctx.quadraticCurveTo(vein.points[i].x, vein.points[i].y, xc, yc);
        }
        ctx.lineTo(vein.points[vein.points.length - 1].x, vein.points[vein.points.length - 1].y);
        ctx.stroke();

        // Gold-Glow entlang der Ader
        for (let i = 0; i < vein.points.length - 1; i++) {
          const t = i / (vein.points.length - 1);
          const segmentProgress = (progress * vein.points.length) % 1;
          const glowAlpha = (1 - Math.abs(t - segmentProgress) * 3) * alpha * 2;
          if (glowAlpha <= 0) continue;

          const px = vein.points[i].x + (vein.points[i + 1]?.x ?? vein.points[i].x) - vein.points[i].x;
          // Vereinfacht: Glow am Segment
          const sx = vein.points[i].x + (vein.points[Math.min(i + 1, vein.points.length - 1)].x - vein.points[i].x) * t;
          const sy = vein.points[i].y + (vein.points[Math.min(i + 1, vein.points.length - 1)].y - vein.points[i].y) * t;

          const glow = ctx.createRadialGradient(sx, sy, 0, sx, sy, 6);
          glow.addColorStop(0, `rgba(255, 240, 200, ${Math.min(0.3, glowAlpha).toFixed(4)})`);
          glow.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = glow;
          ctx.fillRect(sx - 7, sy - 7, 14, 14);
        }
      }
    }

    function update(now) {
      for (let i = blooms.length - 1; i >= 0; i--) {
        const elapsed = now - blooms[i].startTime;
        blooms[i].life = elapsed;
        blooms[i].radius = (elapsed / blooms[i].duration) * blooms[i].maxRadius;
        if (elapsed > blooms[i].duration) blooms.splice(i, 1);
      }

      for (let i = veins.length - 1; i >= 0; i--) {
        veins[i].life = now - veins[i].startTime;
        if (veins[i].life > veins[i].duration) veins.splice(i, 1);
      }

      if (blooms.length < MAX_BLOOMS && Math.random() < 0.012) spawnBloom();
      if (veins.length < MAX_VEINS && Math.random() < 0.008) spawnVein();
    }

    function loop(ts) {
      update(ts);
      drawBg();
      drawHexConnections(ts);
      drawHexagons(ts);
      drawVeins(ts);
      drawBlooms(ts);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);

    // Resize-Handling
    let resizeTimeout;
    window.addEventListener('resize', () => {
      resize();
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(() => {
        initHexGrid();
        buildConnections();
        blooms.length = 0;
        veins.length = 0;
      }, 400);
    });
  </script>
</body>
</html>
