<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>impulspace — crimson & gold</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0505;
      width: 100vw; height: 100vh; overflow: hidden;
      font-family: 'Courier New', monospace;
      cursor: none;
    }
    canvas { display: block; position: fixed; top: 0; left: 0; z-index: 0; }
    .demo-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100vh; pointer-events: none;
    }
    .demo-content h1 {
      color: rgba(210, 160, 90, 0.9);
      font-size: clamp(2rem, 5vw, 4rem);
      font-weight: 300; letter-spacing: 0.2em;
      text-transform: uppercase;
      text-shadow: 0 0 50px rgba(200, 100, 40, 0.25), 0 0 100px rgba(180, 40, 20, 0.12);
    }
    .demo-content p {
      color: rgba(180, 130, 100, 0.4);
      font-size: 0.75rem; letter-spacing: 0.4em;
      text-transform: uppercase; margin-top: 0.8em;
    }
  </style>

<style>
.pv-nav{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(10,11,16,0.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(200,150,62,0.2);font-family:Inter,-apple-system,sans-serif;}
.pv-nav-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:48px;gap:12px;}
.pv-nav-btn,.pv-nav-home{color:#C8963E;text-decoration:none;font-size:13px;font-weight:500;padding:6px 14px;border-radius:6px;transition:all .2s;border:1px solid rgba(200,150,62,0.25);white-space:nowrap;}
.pv-nav-btn:hover,.pv-nav-home:hover{background:rgba(200,150,62,0.12);border-color:rgba(200,150,62,0.5);}
.pv-nav-disabled{color:rgba(255,255,255,0.2);border-color:rgba(255,255,255,0.08);cursor:default;}
.pv-nav-info{color:rgba(255,255,255,0.5);font-size:12px;white-space:nowrap;text-align:center;}
.pv-nav-home{font-family:'Playfair Display',Georgia,serif;font-size:14px;font-weight:600;margin-left:auto;}
@media(max-width:600px){.pv-nav-inner{gap:6px;}.pv-nav-btn{font-size:11px;padding:4px 10px;}.pv-nav-home{display:none;}}
</style>
</head>
<body>
<nav class="pv-nav">
  <div class="pv-nav-inner">
    <a href="/impulspace/preview-2.html" class="pv-nav-btn">← Zurück</a>
    <span class="pv-nav-info">Preview 3 / 6</span>
    <a href="/impulspace/preview-4.html" class="pv-nav-btn">Weiter →</a>
    <a href="/impulspace/" class="pv-nav-home" title="Zur Hauptseite">IMPULSPACE</a>
  </div>
</nav>

  <canvas id="c"></canvas>
  <div class="demo-content">
    <h1>Crimson & Gold</h1>
    <p>Threat Intelligence</p>
  </div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let w, h, mx = -500, my = -500, tmx = -500, tmy = -500;

    function resize() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    window.addEventListener('mousemove', e => { tmx = e.clientX; tmy = e.clientY; });

    // ═══ CRIMSON & GOLD — Machtvoll, autoritär, Bedrohungs-Intelligence ═══
    // Farben: Schwarz, Gold (#c4963c), Crimson (#8b1a1a), tiefer werdendes Rot

    const GOLD    = { r: 196, g: 150, b: 60 };
    const CRIMSON = { r: 139, g: 26,  b: 26 };
    const EMBER   = { r: 220, g: 80,  b: 30 };
    const ASH     = { r: 60,  g: 30,  b: 25 };

    // ——— Konzentrische Sicherheitsringe (wie Firewall-Perimeter) ———
    const rings = [];
    const RING_COUNT = 5;

    class SecurityRing {
      constructor(index) {
        this.cx = w * 0.5;
        this.cy = h * 0.5;
        this.baseRadius = 60 + index * 100;
        this.index = index;
        this.rotation = Math.random() * Math.PI * 2;
        this.rotSpeed = (0.0001 + Math.random() * 0.0002) * (index % 2 === 0 ? 1 : -1);
        this.segments = 3 + Math.floor(Math.random() * 4); // unterbrochene Ringe
        this.segmentGaps = [];
        for (let i = 0; i < this.segments; i++) {
          this.segmentGaps.push(Math.random() * 0.5 + 0.1); // Gap-Größe als Anteil
        }
        this.wobbleAmp = 4 + Math.random() * 12;
        this.wobbleFreq = 0.001 + Math.random() * 0.002;
        this.wobblePhase = Math.random() * Math.PI * 2;
      }

      draw(now) {
        this.cx += (w * 0.5 + (mx - w * 0.5) * 0.02 * this.index - this.cx) * 0.01;
        this.cy += (h * 0.5 + (my - h * 0.5) * 0.02 * this.index - this.cy) * 0.01;

        const alpha = 0.03 + this.index * 0.01;
        const totalSegments = this.segments;
        const segAngle = (Math.PI * 2) / totalSegments;

        for (let s = 0; s < totalSegments; s++) {
          const gapSize = this.segmentGaps[s] * segAngle;
          const startAngle = this.rotation + s * segAngle + gapSize * 0.5;
          const endAngle = startAngle + segAngle - gapSize;

          // Farbe: innere Ringe mehr Crimson, äußere mehr Gold
          const mixGold = this.index / (RING_COUNT - 1);
          const r = Math.round(CRIMSON.r + (GOLD.r - CRIMSON.r) * mixGold);
          const g = Math.round(CRIMSON.g + (GOLD.g - CRIMSON.g) * mixGold);
          const b = Math.round(CRIMSON.b + (GOLD.b - CRIMSON.b) * mixGold);

          // Wobble
          const wobble = Math.sin(now * this.wobbleFreq + this.wobblePhase + s) * this.wobbleAmp;
          const rOuter = this.baseRadius + wobble;

          ctx.strokeStyle = `rgba(${r}, ${g}, ${b}, ${alpha.toFixed(4)})`;
          ctx.lineWidth = 0.4 + this.index * 0.15;
          ctx.beginPath();
          ctx.arc(this.cx, this.cy, rOuter, startAngle, endAngle);
          ctx.stroke();
        }
      }
    }

    for (let i = 0; i < RING_COUNT; i++) rings.push(new SecurityRing(i));

    // ——— Partikel (wie Asche/Glut, langsam aufsteigend) ———
    const embers = [];
    const EMBER_COUNT = 55;

    class Ember {
      constructor() {
        this.reset(true);
      }
      reset(init = false) {
        this.x = Math.random() * w;
        this.y = init ? Math.random() * h : h + 20;
        this.size = 0.3 + Math.random() * 1.5;
        this.speedY = 0.1 + Math.random() * 0.4;
        this.speedX = (Math.random() - 0.5) * 0.3;
        this.wobbleAmp = 0.3 + Math.random() * 1;
        this.wobbleSpeed = 0.01 + Math.random() * 0.03;
        this.wobblePhase = Math.random() * Math.PI * 2;
        this.alpha = 0.03 + Math.random() * 0.12;
        this.pulsePhase = Math.random() * Math.PI * 2;
        this.isGold = Math.random() < 0.35;
      }
      update(now) {
        this.y -= this.speedY;
        this.x += this.speedX + Math.sin(now * this.wobbleSpeed + this.wobblePhase) * this.wobbleAmp;
        if (this.y < -20) { this.y = h + 20; this.x = Math.random() * w; }
        if (this.x < -20) this.x = w + 20;
        if (this.x > w + 20) this.x = -20;
        this.currentAlpha = this.alpha * (0.5 + 0.5 * Math.sin(now * 0.0008 + this.pulsePhase));
      }
    }

    for (let i = 0; i < EMBER_COUNT; i++) embers.push(new Ember());

    // ——— Warn-Pulse (kreisrunde Wellen von Knotenpunkten) ———
    const alerts = [];
    const MAX_ALERTS = 3;

    function spawnAlert() {
      alerts.push({
        x: Math.random() * w,
        y: Math.random() * h,
        radius: 0,
        maxRadius: 100 + Math.random() * 200,
        life: 0,
        maxLife: 2500 + Math.random() * 3000,
        startTime: performance.now(),
      });
    }

    // ——— Render ———

    function drawBg() {
      const grad = ctx.createRadialGradient(w * 0.5, h * 0.5, 0, w * 0.5, h * 0.5, Math.max(w, h) * 0.7);
      grad.addColorStop(0, '#0f0806');
      grad.addColorStop(0.5, '#080403');
      grad.addColorStop(1, '#030101');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, w, h);
    }

    function drawEmbers(now) {
      for (const e of embers) {
        if (e.currentAlpha < 0.005) continue;
        const color = e.isGold ? GOLD : (Math.random() < 0.5 ? EMBER : ASH);
        ctx.fillStyle = `rgba(${color.r}, ${color.g}, ${color.b}, ${e.currentAlpha.toFixed(4)})`;
        ctx.beginPath();
        ctx.arc(e.x, e.y, e.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawAlerts(now) {
      for (const alert of alerts) {
        const progress = alert.life / alert.maxLife;
        const alpha = 0.08 * (1 - progress) * Math.sin(progress * Math.PI);

        ctx.strokeStyle = `rgba(${CRIMSON.r}, ${CRIMSON.g}, ${CRIMSON.b}, ${alpha.toFixed(4)})`;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(alert.x, alert.y, alert.radius, 0, Math.PI * 2);
        ctx.stroke();

        // Zweite Welle (Gold-Akzent)
        if (progress > 0.3) {
          const alpha2 = alpha * 0.5;
          ctx.strokeStyle = `rgba(${GOLD.r}, ${GOLD.g}, ${GOLD.b}, ${alpha2.toFixed(4)})`;
          ctx.beginPath();
          ctx.arc(alert.x, alert.y, alert.radius * 0.7, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function update(now) {
      mx += (tmx - mx) * 0.03;
      my += (tmy - my) * 0.03;

      for (const e of embers) e.update(now);

      for (let i = alerts.length - 1; i >= 0; i--) {
        const elapsed = now - alerts[i].startTime;
        alerts[i].life = elapsed;
        alerts[i].radius = (elapsed / alerts[i].maxLife) * alerts[i].maxRadius;
        if (elapsed > alerts[i].maxLife) alerts.splice(i, 1);
      }

      if (alerts.length < MAX_ALERTS && Math.random() < 0.015) spawnAlert();
    }

    function loop(ts) {
      update(ts);
      drawBg();
      for (const ring of rings) ring.draw(ts);
      drawAlerts(ts);
      drawEmbers(ts);
      requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);
  </script>
</body>
</html>
